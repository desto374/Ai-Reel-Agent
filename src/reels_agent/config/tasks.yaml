intake_task:
  description: >
    Validate the incoming job and produce a normalized manifest that includes the
    input video, requested output count, clip duration range, style profile,
    branding preferences, and output destination.
  expected_output: A normalized job manifest in JSON.

transcription_task:
  description: >
    Review the transcript and build a structured analysis with timestamped topic
    shifts, likely hooks, emotional spikes, quotable lines, and sections that
    can work as short-form clips without extra context.
  expected_output: Transcript analysis JSON with timestamped clip signals.

clip_selection_task:
  description: >
    Choose the strongest 3 to 5 reel candidates using hook strength, clarity,
    emotional intensity, speaker energy, and standalone value. Return timestamps,
    scores, titles, and rationale.
  expected_output: Ranked clip candidates with timestamps and score rationale.

reframing_task:
  description: >
    For each selected clip, define the vertical reframing strategy. Specify
    whether to use face tracking, dynamic crop, split layout, or fallback center crop.
  expected_output: A reframing plan for each selected clip.

qa_delivery_task:
  description: >
    Review the processed clips, verify technical and editorial quality, and
    prepare delivery results including upload status and final asset metadata.
  expected_output: QA report and delivery summary JSON.
